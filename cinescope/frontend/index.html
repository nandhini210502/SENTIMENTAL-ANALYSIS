<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineScope AI — Movie Review Sentiment Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08080f; --surface: #10101a; --card: #14141f; --card2: #1a1a28;
      --border: #26263a; --border2: #32324a; --text: #eeeef8; --muted: #7777a0;
      --muted2: #55557a; --accent: #7c3aed; --accent2: #a855f7;
      --green: #22c55e; --green-dim: rgba(34,197,94,0.15);
      --red: #ef4444; --red-dim: rgba(239,68,68,0.15);
      --yellow: #eab308; --yellow-dim: rgba(234,179,8,0.15);
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 18px;
    }
    body.light { --bg:#f0f0f8; --surface:#e8e8f4; --card:#ffffff; --card2:#f4f4fc; --border:#d0d0e8; --border2:#b8b8d8; --text:#111128; --muted:#6666a0; --muted2:#9999c0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: background 0.3s, color 0.3s; }
    #stars-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; opacity: 0.6; }
    body.light #stars-canvas { opacity: 0.15; }
    #rain-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; opacity: 0; transition: opacity 1s; }
    #rain-canvas.show { opacity: 0.4; }
    .floating-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; overflow: hidden; }
    .floating-item { position: absolute; font-size: 24px; opacity: 0; animation: float-up 4s ease-out forwards; }
    @keyframes float-up { 0% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(-100px) rotate(360deg); opacity: 0; } }
    .page { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 20px 16px 60px; }
    .topbar { display: flex; justify-content: flex-end; margin-bottom: 10px; }
    .theme-toggle { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 100px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 6px; }
    .header { text-align: center; padding: 10px 0 28px; }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 6px; background: linear-gradient(135deg, #fff 0%, #c4b5fd 40%, #7c3aed 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
    .input-section { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 22px; margin-bottom: 16px; }
    textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 14px 16px; border-radius: var(--radius-md); min-height: 120px; outline: none; }
    .btn-analyze { flex: 1; background: linear-gradient(135deg, #6d28d9, #a855f7); color: #fff; border: none; padding: 13px 24px; border-radius: var(--radius-md); font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-analyze:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(124,58,237,0.45); }
    .result-card { display: none; background: rgba(255,255,255,0.03); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-lg); padding: 40px; margin-bottom: 24px; animation: modernFadeIn 0.8s cubic-bezier(0.16,1,0.3,1); box-shadow: 0 20px 50px rgba(0,0,0,0.4); position: relative; }
    @keyframes modernFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .glow-pos { border-color: rgba(34,197,94,0.6) !important; box-shadow: 0 0 40px rgba(34,197,94,0.3); }
    .glow-neg { border-color: rgba(239,68,68,0.6) !important; box-shadow: 0 0 40px rgba(239,68,68,0.3); }
    .glow-neu { border-color: rgba(234,179,8,0.6) !important; box-shadow: 0 0 40px rgba(234,179,8,0.25); }
    .gif-skeleton { position: absolute; inset: 0; background: linear-gradient(90deg, #10101a 25%, #1a1a28 50%, #10101a 75%); background-size: 200% 100%; animation: skeleton-shimmer 1.5s infinite; z-index: 5; }
    @keyframes skeleton-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    #lottie-sentiment { width: 120px; height: 120px; margin: 0 auto 10px; }
    .sentiment-hero { display: flex; align-items: center; gap: 20px; margin-bottom: 18px; }
    .big-emoji { font-size: 64px; }
    .sentiment-label { font-family: 'Bebas Neue', sans-serif; font-size: 40px; }
    .meter-track { background: var(--surface); height: 12px; border-radius: 100px; overflow: hidden; margin-top: 8px; }
    .meter-fill { height: 100%; transition: width 1s ease-out; }
    .gif-section { text-align: center; margin: 32px 0; position: relative; }
    .gif-frame { width: 460px; height: 280px; margin: 0 auto; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.15); position: relative; background: #000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 0 1px rgba(255,255,255,0.05); }
    #reactionScene { width: 100%; height: 100%; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; transition: all 0.5s ease; }
    @keyframes card-shake { 10%,90%{transform:translate3d(-1px,0,0)} 20%,80%{transform:translate3d(2px,0,0)} 30%,50%,70%{transform:translate3d(-3px,0,0)} 40%,60%{transform:translate3d(3px,0,0)} }
    #particleOverlay { position: absolute; inset: 0; pointer-events: none; z-index: 10; overflow: hidden; }
    .confetti { position: absolute; width: 8px; height: 8px; background: var(--green); top: -10px; animation: drop linear forwards; }
    .q-mark { position: absolute; font-size: 24px; color: var(--yellow); opacity: 0; animation: floatUp 2s ease-out forwards; }
    @keyframes drop { to { transform: translateY(260px) rotate(360deg); } }
    @keyframes floatUp { 0%{opacity:0;transform:translateY(50px)} 20%{opacity:1} 100%{opacity:0;transform:translateY(-50px)} }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
    .explanation-box, .highlight-box { background: var(--surface); padding: 14px; border-radius: var(--radius-md); border-left: 3px solid var(--accent); }
    .word-pos { color: #4ade80; font-weight: 600; background: rgba(74,222,128,0.1); padding: 0 4px; border-radius: 4px; }
    .word-neg { color: #f87171; font-weight: 600; background: rgba(248,113,113,0.1); padding: 0 4px; border-radius: 4px; }
    .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(8,8,15,0.9); z-index: 999; align-items: center; justify-content: center; flex-direction: column; backdrop-filter: blur(8px); }
    .loading-overlay.show { display: flex; }
    .reel-container { width: 80px; height: 80px; animation: rotate-reel 4s linear infinite; margin-bottom: 20px; }
    @keyframes rotate-reel { to { transform: rotate(360deg); } }
    .progress-bar-container { width: 200px; height: 6px; background: var(--border); border-radius: 100px; overflow: hidden; margin-top: 10px; }
    .progress-bar-fill { width: 0%; height: 100%; background: var(--accent2); transition: width 0.3s; }
    .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-top: 20px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); padding: 16px; text-align: center; border-radius: var(--radius-md); }
    .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 32px; }
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
    .chart-card { background: var(--card); padding: 18px; border-radius: var(--radius-md); }
    .history-card { background: var(--card); padding: 18px; margin-top: 20px; border-radius: var(--radius-md); }
  </style>
</head>
<body>
<canvas id="stars-canvas"></canvas>
<canvas id="rain-canvas"></canvas>
<div class="floating-container" id="floatingContainer"></div>
<div class="page">
  <div class="topbar">
    <button class="theme-toggle" onclick="toggleTheme()">
      <span id="themeIcon">☀️</span> <span id="themeLabel">Light Mode</span>
    </button>
  </div>
  <div class="header">
    <div class="logo">CineScope AI</div>
    <div class="tagline">🎬 Movie Review Sentiment Analyzer</div>
  </div>
  <div class="input-section">
    <textarea id="reviewText" placeholder="How was the movie?" oninput="document.getElementById('charCount').textContent=this.value.length+' / 1000'" maxlength="1000"></textarea>
    <div style="display:flex; gap:10px; margin-top:12px; align-items:center;">
      <button class="btn-analyze" id="analyzeBtn" onclick="analyzeReview()">🎬 Analyze Sentiment</button>
      <button onclick="clearAll()" style="padding:13px 18px; background:var(--surface); border:1px solid var(--border); color:var(--muted); border-radius:var(--radius-md); cursor:pointer;">✕ Clear</button>
      <span id="charCount" style="font-size:12px; color:var(--muted2); margin-left:auto;">0 / 1000</span>
    </div>
    <div id="errorMsg" style="display:none; color:var(--red); padding:10px; margin-top:10px; background:var(--red-dim); border-radius:8px;"></div>
  </div>
  <div class="result-card" id="resultCard">
    <div id="lottie-sentiment"></div>
    <div class="sentiment-hero">
      <div class="big-emoji" id="heroEmoji">😊</div>
      <div class="sentiment-info">
        <div class="sentiment-label" id="sentimentLabel">POSITIVE</div>
        <div style="font-size:13px; color:var(--muted);">Confidence: <strong id="confScore">--</strong>%</div>
      </div>
    </div>
    <div class="meter-track"><div class="meter-fill" id="meterFill" style="width:0%"></div></div>
    <div class="gif-section">
      <div class="gif-label" style="font-size:12px; text-transform:uppercase; margin-bottom:14px; color:var(--muted); letter-spacing:3px; font-weight:600;">🎭 Human Reaction Vibe</div>
      <div class="gif-frame" id="gifContainer">
        <div class="gif-skeleton" id="gifSkeleton"></div>
        <div id="reactionScene"></div>
        <div id="particleOverlay"></div>
      </div>
    </div>
    <div class="two-col">
      <div class="explanation-box"><div style="font-size:11px; text-transform:uppercase; margin-bottom:6px;">💡 AI Explanation</div><div id="explanationText"></div></div>
      <div class="highlight-box"><div style="font-size:11px; text-transform:uppercase; margin-bottom:6px;">🖋️ Highlights</div><div id="highlightedText"></div></div>
    </div>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" id="statTotal">0</div><div>Total</div></div>
    <div class="stat-card"><div class="stat-num" id="statPos" style="color:var(--green)">0</div><div>Positive</div></div>
    <div class="stat-card"><div class="stat-num" id="statNeg" style="color:var(--red)">0</div><div>Negative</div></div>
    <div class="stat-card"><div class="stat-num" id="statNeu" style="color:var(--yellow)">0</div><div>Neutral</div></div>
  </div>
  <div class="charts-row">
    <div class="chart-card"><div style="font-size:11px; margin-bottom:10px;">📊 DISTRIBUTION</div><div style="height:200px;"><canvas id="pieChart"></canvas></div></div>
    <div class="chart-card"><div style="font-size:11px; margin-bottom:10px;">📈 TRENDS</div><div style="height:200px;"><canvas id="barChart"></canvas></div></div>
  </div>
  <div class="history-card">
    <div style="font-size:11px; margin-bottom:12px;">🕐 HISTORY</div>
    <div id="historyList" style="max-height:220px; overflow-y:auto; display:flex; flex-direction:column; gap:8px;">
      <div style="color:var(--muted2); font-size:13px; text-align:center; padding:20px;">No reviews yet.</div>
    </div>
  </div>
  <div style="text-align:center; font-size:12px; color:var(--muted2); margin-top:40px;">CINESCOPE AI · Pure JS Mode</div>
</div>
<div class="loading-overlay" id="loadingOverlay">
  <div class="reel-container">
    <svg viewBox="0 0 100 100" fill="currentColor" color="var(--accent2)">
      <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle cx="50" cy="50" r="5" fill="currentColor"/>
      <path d="M50 5 L50 20 M50 80 L50 95 M5 50 L20 50 M80 50 L95 50" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
      <circle cx="30" cy="30" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle cx="70" cy="30" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle cx="30" cy="70" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
      <circle cx="70" cy="70" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
    </svg>
  </div>
  <div style="text-align:center;">
    <div id="loadingMain" style="font-size:16px; color:var(--text); font-weight:500;">Analyzing Review...</div>
    <div id="loadingSub" style="font-size:13px; color:var(--muted); margin-top:4px;">Analyzing sentiment...</div>
    <div class="progress-bar-container"><div class="progress-bar-fill" id="loadingBar"></div></div>
  </div>
</div>
<script>
let stats={total:0,pos:0,neg:0,neu:0}, history=[], pieChart=null, barChart=null, isDark=true;

function analyzeReview() {
  const text = document.getElementById('reviewText').value.trim();
  if (!text) return showError('Please enter a movie review.');
  if (text.length < 5) return showError('Review is too short.');
  setLoading(true); showError('');
  document.getElementById('analyzeBtn').disabled = true;
  setTimeout(() => {
    const POS = new Set(["amazing","brilliant","outstanding","excellent","wonderful","fantastic","superb","masterpiece","breathtaking","stunning","perfect","incredible","beautiful","enjoyable","great","best","awesome","magnificent","hilarious","touching","emotional","gripping","captivating","flawless","loved","impressive","remarkable","extraordinary","genius","powerful","moving","inspiring","thrilling","enchanting","delightful","heartwarming","unforgettable","spectacular","phenomenal","glorious","splendid","terrific","marvelous","exceptional","engaging","riveting","creative","refreshing","compelling","vivid","good","nice","fine","decent","solid","worthy","pleasant","fun","cool","liked","interesting","fascinating","charming","warm","clever","smart","rich","deep","exciting","entertaining","satisfying","rewarding","well","better"]);
    const NEG = new Set(["boring","terrible","awful","worst","bad","disappointing","dull","horrible","waste","poor","pathetic","stupid","ridiculous","slow","ugly","unwatchable","annoying","predictable","forgettable","offensive","mediocre","bland","flat","weak","mess","disaster","failure","pointless","lifeless","tedious","overrated","confusing","incoherent","uninspired","derivative","shallow","unconvincing","forced","cringe","laughable","atrocious","abysmal","dreadful","insufferable","pretentious","hollow","soulless","worse","fail","hate","hated","dislike","silly"]);
    const NEGATIONS = new Set(["not","never","no","neither","nor","barely","hardly","doesn't","isn't","wasn't","won't","can't","couldn't","didn't"]);
    const INTENSIFIERS = new Set(["very","extremely","absolutely","incredibly","truly","deeply","utterly","completely","totally","highly","super","really"]);
    const lower = text.toLowerCase();
    const segments = lower.split(/(\b(?:but|however|though|although|yet|nevertheless)\b)/);
    let posScore=0, negScore=0, posFound=[], negFound=[];
    segments.forEach((seg,i) => {
      const weight = i>0 ? 1.3 : 1.0;
      const words = seg.match(/\b\w+\b/g)||[];
      words.forEach((word,j) => {
        const prev=words[j-1]||'';
        const mult=INTENSIFIERS.has(prev)?1.5:1.0;
        const neg=NEGATIONS.has(prev);
        if(POS.has(word)){neg?(negScore+=mult*weight,negFound.push('not '+word)):(posScore+=mult*weight,posFound.push(word));}
        else if(NEG.has(word)){neg?(posScore+=mult*weight,posFound.push('not '+word)):(negScore+=mult*weight,negFound.push(word));}
      });
    });
    const total=posScore+negScore, diff=Math.abs(posScore-negScore);
    let sentiment, confidence;
    if(total===0){sentiment='neutral';confidence=50;}
    else if(posScore>0&&negScore>0&&diff<=1.5){sentiment='neutral';confidence=65+total*2;}
    else if(posScore>negScore){sentiment='positive';confidence=60+(posScore/(total+0.1)*35);}
    else{sentiment='negative';confidence=60+(negScore/(total+0.1)*35);}
    confidence=Math.round(Math.max(40,Math.min(99,confidence)));
    posFound=[...new Set(posFound)].slice(0,5);
    negFound=[...new Set(negFound)].slice(0,5);
    let explanation;
    if(sentiment==='neutral') explanation=posScore>0&&negScore>0?`Balanced Feedback: Detected positive signals like '${posFound.slice(0,2).join(', ')}' but also critical points like '${negFound.slice(0,2).join(', ')}', resulting in a mixed neutral tone.`:'Objective Tone: The review focuses on descriptive details without strong emotional markers.';
    else if(sentiment==='positive') explanation=`Positive Vibe: The strengths (${posFound.slice(0,3).join(', ')}) clearly outweigh any concerns, indicating an enjoyable experience.`;
    else explanation=`Critical Tone: The analysis found significant negative indicators like '${negFound.slice(0,3).join(', ')}', which dominate the feedback.`;
    const result={sentiment,confidence,positive_words:posFound,negative_words:negFound,explanation};
    displayResult(result,text); addHistory(result,text); updateStats(result.sentiment); updateCharts();
    setLoading(false); document.getElementById('analyzeBtn').disabled=false;
  },800);
}

function displayResult(r,reviewText) {
  const sent=r.sentiment,conf=r.confidence,color=(sent==='positive'?'#22c55e':(sent==='negative'?'#ef4444':'#eab308'));
  const icons={positive:'😊',negative:'😞',neutral:'😐'};
  document.getElementById('heroEmoji').textContent=icons[sent];
  document.getElementById('sentimentLabel').textContent=sent.toUpperCase();
  document.getElementById('sentimentLabel').style.color=color;
  document.getElementById('confScore').textContent=conf;
  const fill=document.getElementById('meterFill');
  fill.style.background=color; setTimeout(()=>fill.style.width=conf+'%',100);
  const card=document.getElementById('resultCard'), skeleton=document.getElementById('gifSkeleton');
  card.style.display='none'; void card.offsetWidth; card.style.display='block';
  card.className='result-card glow-'+sent.substring(0,3);
  skeleton.style.display='block';
  document.getElementById('reactionScene').innerHTML='';
  setTimeout(()=>{skeleton.style.display='none'; showReactionScene(sent);},600);
  triggerParticles(sent);
  if(sent==='positive') confetti({particleCount:150,spread:70,origin:{y:0.6}});
  toggleRain(sent==='negative');
  document.getElementById('explanationText').textContent=r.explanation;
  const posWords=r.positive_words.map(w=>w.toLowerCase());
  const negWords=r.negative_words.map(w=>w.toLowerCase());
  const hl=reviewText.split(/(\s+)/).map(t=>{
    const c=t.toLowerCase().replace(/[^a-z]/g,'');
    if(posWords.includes(c)) return `<span class="word-pos">${t}</span>`;
    if(negWords.includes(c)) return `<span class="word-neg">${t}</span>`;
    return t;
  }).join('');
  document.getElementById('highlightedText').innerHTML=hl;
  setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'nearest'}),200);
}

function updateStats(s) {
  stats.total++; stats[s.substring(0,3)]++;
  ['statTotal','statPos','statNeg','statNeu'].forEach(id=>{
    const val=(id==='statTotal'?stats.total:stats[id.substring(4).toLowerCase().substring(0,3)]);
    document.getElementById(id).textContent=val;
  });
}

function addHistory(r,text) {
  history.push({sentiment:r.sentiment,confidence:r.confidence,text:text.substring(0,50)});
  const list=document.getElementById('historyList');
  if(list.innerText.includes('No reviews')) list.innerHTML='';
  const item=document.createElement('div');
  item.style=`padding:8px 12px; background:var(--surface); border-radius:8px; font-size:13px; border-left:3px solid ${(r.sentiment==='positive'?'#22c55e':(r.sentiment==='negative'?'#ef4444':'#eab308'))}`;
  item.innerHTML=`<span>${r.sentiment==='positive'?'😊':(r.sentiment==='negative'?'😞':'😐')}</span> ${text.substring(0,50)}... <strong>${r.confidence}%</strong>`;
  list.insertBefore(item,list.firstChild);
}

function updateCharts() {
  const ctxP=document.getElementById('pieChart').getContext('2d');
  if(pieChart) pieChart.destroy();
  pieChart=new Chart(ctxP,{type:'doughnut',data:{labels:['Positive','Negative','Neutral'],datasets:[{data:[stats.pos,stats.neg,stats.neu],backgroundColor:['#22c55e','#ef4444','#eab308'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{labels:{color:'#eeeef8'}}}}});
  const ctxB=document.getElementById('barChart').getContext('2d');
  if(barChart) barChart.destroy();
  const last7=history.slice(-7);
  barChart=new Chart(ctxB,{type:'bar',data:{labels:last7.map((_,i)=>'#'+(history.length-last7.length+i+1)),datasets:[{label:'Confidence %',data:last7.map(h=>h.confidence),backgroundColor:last7.map(h=>h.sentiment==='positive'?'rgba(34,197,94,0.7)':h.sentiment==='negative'?'rgba(239,68,68,0.7)':'rgba(234,179,8,0.7)'),borderColor:last7.map(h=>h.sentiment==='positive'?'#22c55e':h.sentiment==='negative'?'#ef4444':'#eab308'),borderWidth:1,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,scales:{y:{min:0,max:100,ticks:{color:'#7777a0'},grid:{color:'rgba(255,255,255,0.05)'}},x:{ticks:{color:'#7777a0'},grid:{display:false}}},plugins:{legend:{display:false}}}});
}

function toggleTheme() {
  isDark=!isDark; document.body.classList.toggle('light',!isDark);
  document.getElementById('themeIcon').textContent=isDark?'☀️':'🌙';
  updateCharts();
}

function clearAll(){document.getElementById('reviewText').value='';document.getElementById('resultCard').style.display='none';}
function setLoading(s){
  document.getElementById('loadingOverlay').classList.toggle('show',s);
  const bar=document.getElementById('loadingBar');
  if(s){let p=0;const i=setInterval(()=>{p+=10;if(p>90)clearInterval(i);bar.style.width=p+'%';},200);}
  else bar.style.width='0%';
}

function triggerParticles(s) {
  const container=document.getElementById('particleOverlay');
  container.innerHTML='';
  if(s==='neutral'){for(let i=0;i<8;i++){const q=document.createElement('div');q.className='q-mark';q.textContent='❓';q.style.left=Math.random()*100+'%';q.style.animationDelay=Math.random()*2+'s';container.appendChild(q);}}
  else if(s==='positive'){for(let i=0;i<20;i++){const c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'%';c.style.backgroundColor=`hsl(${Math.random()*360},70%,60%)`;c.style.animationDuration=(1+Math.random()*2)+'s';c.style.animationDelay=Math.random()+'s';container.appendChild(c);}}
}
function toggleRain(s){document.getElementById('rain-canvas').classList.toggle('show',s);}

function initVisuals() {
  const cS=document.getElementById('stars-canvas'),ctxS=cS.getContext('2d');
  const cR=document.getElementById('rain-canvas'),ctxR=cR.getContext('2d');
  function res(){cS.width=cR.width=window.innerWidth;cS.height=cR.height=window.innerHeight;}
  window.addEventListener('resize',res);res();
  let stars=Array.from({length:100},()=>({x:Math.random()*cS.width,y:Math.random()*cS.height,s:Math.random()*0.5+0.2}));
  let drops=Array.from({length:80},()=>({x:Math.random()*cR.width,y:Math.random()*cR.height,v:5+Math.random()*5}));
  function draw(){
    ctxS.clearRect(0,0,cS.width,cS.height);ctxS.fillStyle='white';
    stars.forEach(s=>{ctxS.beginPath();ctxS.arc(s.x,s.y,s.s,0,7);ctxS.fill();});
    ctxR.clearRect(0,0,cR.width,cR.height);ctxR.strokeStyle='rgba(174,194,224,0.5)';
    drops.forEach(d=>{ctxR.beginPath();ctxR.moveTo(d.x,d.y);ctxR.lineTo(d.x,d.y+10);ctxR.stroke();d.y+=d.v;if(d.y>cR.height)d.y=-10;});
    requestAnimationFrame(draw);
  }
  draw();
}
initVisuals();
updateCharts();
